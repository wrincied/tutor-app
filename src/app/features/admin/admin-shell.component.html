<div class="page app-scroll-page admin-page">
  <header class="page-header">
    <h1>{{ i18n.adminUi().title }}</h1>
  </header>

  <nav class="admin-tabs" [attr.aria-label]="i18n.adminUi().title">
    <a
      routerLink="/app/admin"
      routerLinkActive="admin-tabs__tab--active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="admin-tabs__tab"
    >
      {{ i18n.adminUi().dashboardTab }}
    </a>
    <a
      routerLink="/app/admin/users"
      routerLinkActive="admin-tabs__tab--active"
      class="admin-tabs__tab"
    >
      {{ i18n.adminUi().usersTab }}
    </a>
    <a
      routerLink="/app/admin/settings"
      routerLinkActive="admin-tabs__tab--active"
      class="admin-tabs__tab"
    >
      {{ i18n.adminUi().settingsTab }}
    </a>
    <a
      routerLink="/app/admin/landing"
      routerLinkActive="admin-tabs__tab--active"
      class="admin-tabs__tab"
    >
      {{ i18n.adminUi().landingTab }}
    </a>
  </nav>

  <div class="scrollable-content admin-page__content">
    <router-outlet />
  </div>
</div>
