<div class="auth-split">
  <section class="auth-split__panel">
    <span class="auth-split__brand">Simple4U</span>

    <div class="auth-split__card">
      <h1>{{ i18n.authUi().verifyNoticeTitle }}</h1>
      <p class="subtitle">{{ i18n.authUi().verifyNoticeSubtitle }}</p>

      @if (email) {
        <p class="auth-email-display">{{ email }}</p>
      }

      <p class="auth-hint">{{ i18n.authUi().checkEmailPurgeHint }}</p>

      @if (message()) {
        <p class="auth-success">{{ message() }}</p>
      }
      @if (error()) {
        <div class="auth-error">{{ error() }}</div>
      }

      <div class="auth-actions auth-actions--stack">
        <button type="button" class="auth-btn-primary" [disabled]="loading()" (click)="resend()">
          {{ loading() ? i18n.authUi().checkEmailSending : i18n.authUi().resendVerification }}
        </button>
        <button
          type="button"
          class="auth-btn-secondary"
          [disabled]="loading()"
          (click)="checkVerified()"
        >
          {{ i18n.authUi().verifyRefreshStatus }}
        </button>
        <button type="button" class="auth-link-button auth-link-button--block" (click)="signOut()">
          {{ i18n.authUi().signOut }}
        </button>
      </div>
    </div>
  </section>

  <aside class="auth-split__visual" aria-hidden="true">
    <div class="auth-aurora">
      <span class="auth-aurora__blob auth-aurora__blob--1"></span>
      <span class="auth-aurora__blob auth-aurora__blob--2"></span>
      <span class="auth-aurora__blob auth-aurora__blob--3"></span>
    </div>
  </aside>
</div>
