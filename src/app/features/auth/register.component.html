<div class="auth-split">
  <section class="auth-split__panel">
    <a routerLink="/" class="auth-split__brand">Simple4U</a>

    <div class="auth-split__tabs" role="tablist">
      <a routerLink="/login" class="auth-split__tab" role="tab" aria-selected="false">
        {{ i18n.authUi().login }}
      </a>
      <a
        routerLink="/register"
        class="auth-split__tab auth-split__tab--active"
        role="tab"
        aria-selected="true"
      >
        {{ i18n.authUi().createAccount }}
      </a>
    </div>

    <div class="auth-split__card">
      <h1>{{ i18n.authUi().registerTitle }}</h1>
      <p class="subtitle">{{ i18n.authUi().registerSubtitle }}</p>

      @if (error()) {
        <div class="auth-error">{{ error() }}</div>
      }

      <form (ngSubmit)="submit()" class="auth-form" autocomplete="on">
        <div class="field field--float">
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            required
            placeholder=" "
            autocomplete="email"
            inputmode="email"
            spellcheck="false"
          />
          <label>{{ i18n.authUi().email }}</label>
        </div>

        <div class="field field--float">
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            required
            placeholder=" "
            autocomplete="new-password"
          />
          <label>{{ i18n.authUi().password }}</label>
        </div>

        <div class="field field--float">
          <input
            type="password"
            [(ngModel)]="passwordConfirm"
            name="passwordConfirm"
            required
            placeholder=" "
            autocomplete="new-password"
          />
          <label>{{ i18n.authUi().confirmPassword }}</label>
        </div>

        <button type="submit" class="auth-btn-primary" [disabled]="loading()">
          {{ loading() ? i18n.authUi().creating : i18n.authUi().createAccount }}
        </button>

        <div class="auth-divider">
          <span>{{ i18n.authUi().orContinueWith }}</span>
        </div>

        <button
          type="button"
          class="auth-oauth-btn"
          [disabled]="loading()"
          (click)="signInWithGoogle()"
        >
          {{ i18n.authUi().continueWithGoogle }}
        </button>
      </form>
    </div>

    <a routerLink="/" class="auth-split__home">{{ i18n.authUi().backHome }}</a>
  </section>

  <aside class="auth-split__visual" aria-hidden="true">
    <div class="auth-aurora">
      <span class="auth-aurora__blob auth-aurora__blob--1"></span>
      <span class="auth-aurora__blob auth-aurora__blob--2"></span>
      <span class="auth-aurora__blob auth-aurora__blob--3"></span>
    </div>
  </aside>
</div>
