<div class="auth-page">
  <span class="auth-logo">TutorApp</span>

  <div class="auth-card">
    <h1>{{ i18n.authUi().loginTitle }}</h1>
    <p class="subtitle">{{ i18n.authUi().loginSubtitle }}</p>

    @if (error()) {
      <div class="auth-error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <input type="email" [(ngModel)]="email" name="email" required placeholder=" " />
        <label>{{ i18n.authUi().email }}</label>
      </div>

      <div class="field">
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder=" "
          autocomplete="current-password"
        />
        <label>{{ i18n.authUi().password }}</label>
      </div>

      <div class="auth-actions">
        <a routerLink="/register">{{ i18n.authUi().noAccount }}</a>
        <button type="submit" [disabled]="loading()">
          {{ loading() ? i18n.authUi().loggingIn : i18n.authUi().login }}
        </button>
      </div>
    </form>
  </div>
</div>
