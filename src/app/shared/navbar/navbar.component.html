<!-- Desktop sidebar -->
<aside class="sidebar" [class.collapsed]="collapsed()">
  <div class="sidebar-logo">TutorApp</div>
  <div class="sidebar-logo-short">T</div>

  <nav class="nav-links">
    <a routerLink="/app/home" routerLinkActive="active" class="nav-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span>{{ i18n.nav().home }}</span>
    </a>
    <a routerLink="/app/students" routerLinkActive="active" class="nav-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>{{ i18n.nav().students }}</span>
    </a>
    <a routerLink="/app/calendar" routerLinkActive="active" class="nav-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>{{ i18n.nav().calendar }}</span>
    </a>
    <a routerLink="/app/finance" routerLinkActive="active" class="nav-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="1" x2="12" y2="23"/>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
      <span>{{ i18n.nav().finance }}</span>
    </a>
  </nav>
  <details class="lang-dropdown" #langMenu>
    <summary class="sidebar-btn lang-dropdown__trigger">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span class="lang-dropdown__current">{{ i18n.labelForLang(i18n.lang()) }}</span>
      <svg class="lang-dropdown__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </summary>
    <div class="lang-dropdown__panel" role="listbox">
      @for (code of i18n.allLangs; track code) {
        <button
          type="button"
          class="lang-dropdown__option"
          [class.lang-dropdown__option--active]="i18n.lang() === code"
          (click)="pickLang(code, langMenu)"
          role="option"
          [attr.aria-selected]="i18n.lang() === code"
        >
          {{ i18n.labelForLang(code) }}
        </button>
      }
    </div>
  </details>
  <button class="sidebar-btn" (click)="toggleTheme()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <span>{{ dark() ? i18n.nav().themeLight : i18n.nav().themeDark }}</span>
  </button>

  <button class="sidebar-btn logout" (click)="auth.logout()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    <span>{{ i18n.nav().logout }}</span>
  </button>
</aside>

<!-- Mobile bottom nav -->
<nav class="bottom-nav">
  <a routerLink="/app/home" routerLinkActive="active" class="bottom-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </svg>
    {{ i18n.nav().home }}
  </a>
  <a routerLink="/app/students" routerLinkActive="active" class="bottom-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
    </svg>
    {{ i18n.nav().students }}
  </a>
  <a routerLink="/app/calendar" routerLinkActive="active" class="bottom-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    {{ i18n.nav().calendar }}
  </a>
  <a routerLink="/app/finance" routerLinkActive="active" class="bottom-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="1" x2="12" y2="23"/>
      <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
    </svg>
    {{ i18n.nav().finance }}
  </a>
</nav>
