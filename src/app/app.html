@if (showNavbar()) {
  <div class="app-shell">
    <app-navbar />
    <div class="app-content">
      <div class="app-page-host">
        <router-outlet />
      </div>
    </div>
  </div>
} @else {
  <router-outlet />
}

<app-dialog
  [open]="!!unlinkAlert.alert()"
  [title]="unlinkDialogTitle()"
  [dismissLabel]="unlinkDialogOk()"
  (cancel)="unlinkAlert.dismiss()"
>
  <p>{{ unlinkDialogMessage() }}</p>
</app-dialog>
