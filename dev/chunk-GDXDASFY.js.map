<div class="auth-page">
  <span class="auth-logo">Simple4U</span>

  <div class="auth-card">
    <h1>{{ i18n.authUi().registerTitle }}</h1>
    <p class="subtitle">{{ i18n.authUi().registerSubtitle }}</p>

    @if (error()) {
      <div class="auth-error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()" class="auth-form" autocomplete="on">
      <div class="field field--float">
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          placeholder=" "
          autocomplete="email"
          inputmode="email"
          spellcheck="false"
        />
        <label>{{ i18n.authUi().email }}</label>
      </div>

      <div class="field field--float">
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder=" "
          autocomplete="new-password"
        />
        <label>{{ i18n.authUi().password }}</label>
      </div>

      <div class="field field--float">
        <input
          type="password"
          [(ngModel)]="passwordConfirm"
          name="passwordConfirm"
          required
          placeholder=" "
          autocomplete="new-password"
        />
        <label>{{ i18n.authUi().confirmPassword }}</label>
      </div>

      <div class="auth-actions">
        <a routerLink="/login">{{ i18n.authUi().hasAccount }}</a>
        <button type="submit" [disabled]="loading()">
          {{ loading() ? i18n.authUi().creating : i18n.authUi().createAccount }}
        </button>
      </div>

      <div class="auth-divider">
        <span>{{ i18n.authUi().orContinueWith }}</span>
      </div>

      <button
        type="button"
        class="auth-oauth-btn"
        [disabled]="loading()"
        (click)="signInWithGoogle()"
      >
        {{ i18n.authUi().continueWithGoogle }}
      </button>
    </form>
  </div>
</div>
