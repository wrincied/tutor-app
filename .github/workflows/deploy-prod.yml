name: Deploy Prod to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROD_API_URL: ${{ secrets.PROD_API_URL }}
      PROD_API_URL_FALLBACK: 'https://tutor-app-backend--tutorassis.europe-west4.hosted.app'
      PROD_APP_URL: https://wrincied.github.io/tutor-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate environment.production.ts for GitHub Pages prod
        run: |
          API_URL="${PROD_API_URL:-$PROD_API_URL_FALLBACK}"
          if [ -z "$API_URL" ]; then
            echo "::error::Backend URL is missing. Set secret PROD_API_URL in GitHub Actions OR fill PROD_API_URL_FALLBACK in .github/workflows/deploy-prod.yml"
            exit 1
          fi
          if [ -z "$PROD_API_URL" ]; then
            echo "::warning::Using PROD_API_URL_FALLBACK from workflow file (secret PROD_API_URL is not set)"
          fi
          cat > src/environments/environment.production.ts << EOF
          export const environment = {
            production: true,
            apiUrl: '${API_URL}',
            appUrl: '${PROD_APP_URL}',
            firebaseConfig: {
              apiKey: 'AIzaSyDI_O1K8uBbEIe2uJvY-8tzpJjfhgg0rlw',
              authDomain: 'simple4u-64822.web.app',
              projectId: 'tutorassis',
              storageBucket: 'tutorassis.firebasestorage.app',
              messagingSenderId: '965411338053',
              appId: '1:965411338053:web:d98317afdb5602a53c702c',
              measurementId: 'G-TXM74NGN6R',
            },
          };
          EOF

      - name: Build Angular Prod
        run: npx ng build --configuration=production --base-href=/tutor-app/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/tutor/browser
          target-folder: .
          branch: gh-pages
