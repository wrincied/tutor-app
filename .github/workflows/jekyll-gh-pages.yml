name: Deploy Dev to GitHub Pages

on:
  push:
    branches: ['dev']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEV_API_URL: ${{ secrets.DEV_API_URL }}
      DEV_API_URL_FALLBACK: 'https://tutor-app-backend--tutorassis.europe-west4.hosted.app'
      DEV_APP_URL: https://wrincied.github.io/tutor-app/dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # environment.ts gitignored — Angular path @environment needs the file present.
      - name: Generate studio environment for GitHub Pages
        run: |
          API_URL="${DEV_API_URL:-$DEV_API_URL_FALLBACK}"
          if [ -z "$API_URL" ]; then
            echo "::error::Backend URL is missing. Set secret DEV_API_URL or DEV_API_URL_FALLBACK."
            exit 1
          fi
          if [ -z "$DEV_API_URL" ]; then
            echo "::warning::Using DEV_API_URL_FALLBACK (secret DEV_API_URL is not set)"
          fi
          cat > src/environments/environment.production-design.ts << EOF
          export const environment = {
            production: true,
            designMode: true,
            apiUrl: '${API_URL}',
            appUrl: '${DEV_APP_URL}',
            firebaseConfig: {
              apiKey: 'AIzaSyDI_O1K8uBbEIe2uJvY-8tzpJjfhgg0rlw',
              authDomain: 'simple4u-64822.web.app',
              projectId: 'tutorassis',
              storageBucket: 'tutorassis.firebasestorage.app',
              messagingSenderId: '965411338053',
              appId: '1:965411338053:web:d98317afdb5602a53c702c',
              measurementId: 'G-TXM74NGN6R',
            },
          };
          EOF
          cp src/environments/environment.production-design.ts src/environments/environment.ts
          node scripts/prepare-environment.mjs production-design

      - name: Build Angular for GitHub Pages
        run: npx ng build --configuration=production-design --base-href=/tutor-app/dev/

      - name: Create Root Redirect Fallback
        run: |
          mkdir -p dist/root_fallback
          cat > dist/root_fallback/index.html << 'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Simple4U</title>
              <meta http-equiv="refresh" content="0; url=/tutor-app/dev/">
              <link rel="canonical" href="/tutor-app/dev/">
              <script>location.replace('/tutor-app/dev/' + (location.hash || ''));</script>
            </head>
            <body>
              <p>Redirecting to <a href="/tutor-app/dev/">Simple4U dev</a>…</p>
            </body>
          </html>
          EOF

      - name: Deploy Angular App
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/tutor/browser
          target-folder: dev
          branch: gh-pages

      - name: Deploy Root Redirect
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/root_fallback
          target-folder: .
          branch: gh-pages
          clean: false
