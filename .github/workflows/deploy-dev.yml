name: Deploy Dev to GitHub Pages

on:
  push:
    branches:
      - dev # Скрипт срабатывает только при пуше в develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Angular Dev
        run: npx ng build --configuration=development --base-href=/simple4u/dev/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/simple4u/browser # Путь к твоей собранной папке
          target-folder: dev # Заливать строго в подпапку dev в ветке gh-pages
          branch: gh-pages # Ветка, откуда GitHub Pages берет сайт