name: Deploy Dev to GitHub Pages

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Вариант A (лучше): GitHub → Settings → Secrets and variables → Actions → DEV_API_URL
      DEV_API_URL: ${{ secrets.DEV_API_URL }}
      # Вариант B: если секрет не задан — впиши URL бэкенда сюда (без /api и без слэша в конце)
      DEV_API_URL_FALLBACK: ''
      DEV_APP_URL: https://wrincied.github.io/tutor-app/dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate environment.ts for GitHub Pages dev
        run: |
          API_URL="${DEV_API_URL:-$DEV_API_URL_FALLBACK}"
          if [ -z "$API_URL" ]; then
            echo "::error::Backend URL is missing. Set secret DEV_API_URL in GitHub Actions OR fill DEV_API_URL_FALLBACK in .github/workflows/deploy-dev.yml"
            exit 1
          fi
          if [ -z "$DEV_API_URL" ]; then
            echo "::warning::Using DEV_API_URL_FALLBACK from workflow file (secret DEV_API_URL is not set)"
          fi
          mkdir -p src/environments
          cat > src/environments/environment.ts << EOF
          export const environment = {
            production: false,
            apiUrl: '${API_URL}',
            appUrl: '${DEV_APP_URL}',
            firebaseConfig: {
              apiKey: 'AIzaSyDI_O1K8uBbEIe2uJvY-8tzpJjfhgg0rlw',
              authDomain: 'simple4u-64822.web.app',
              projectId: 'tutorassis',
              storageBucket: 'tutorassis.firebasestorage.app',
              messagingSenderId: '965411338053',
              appId: '1:965411338053:web:d98317afdb5602a53c702c',
              measurementId: 'G-TXM74NGN6R',
            },
          };
          EOF

      - name: Build Angular Dev
        run: npx ng build --configuration=production --base-href=/tutor-app/dev/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/tutor/browser
          target-folder: dev
          branch: gh-pages
