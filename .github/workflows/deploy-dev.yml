name: Deploy Dev to GitHub Pages

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate environment files for GitHub Pages dev
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.ts << 'EOF'
          export const environment = {
            production: false,
            // TODO: URL Node-бэкенда (App Hosting / Cloud Run / ngrok), без слэша в конце
            // Пример ngrok: https://abc123.ngrok-free.app
            apiUrl: 'https://YOUR-BACKEND-URL-HERE',
            // TODO: публичный URL dev-стенда на GitHub Pages
            appUrl: 'https://YOUR-GITHUB-USERNAME.github.io/tutor-app/dev',
            firebaseConfig: {
              apiKey: 'AIzaSyDI_O1K8uBbEIe2uJvY-8tzpJjfhgg0rlw',
              authDomain: 'simple4u-64822.web.app',
              projectId: 'tutorassis',
              storageBucket: 'tutorassis.firebasestorage.app',
              messagingSenderId: '965411338053',
              appId: '1:965411338053:web:d98317afdb5602a53c702c',
              measurementId: 'G-TXM74NGN6R',
            },
          };
          EOF
          # development-сборка подменяет environment.ts → environment.development.ts
          cp src/environments/environment.ts src/environments/environment.development.ts

      - name: Build Angular Dev
        run: npx ng build --configuration=development --base-href=/tutor-app/dev/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/tutor/browser
          target-folder: dev
          branch: gh-pages
