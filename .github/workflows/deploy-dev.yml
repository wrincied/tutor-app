name: Deploy Dev to GitHub Pages

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate environment.ts
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.ts << 'EOF'
          export const environment = {
            production: false,
            apiUrl: 'https://PLACEHOLDER-api.example.com',
            appUrl: 'https://PLACEHOLDER.example.com',
            firebaseConfig: {
              apiKey: 'PLACEHOLDER',
              authDomain: 'PLACEHOLDER',
              projectId: 'PLACEHOLDER',
              storageBucket: 'PLACEHOLDER',
              messagingSenderId: 'PLACEHOLDER',
              appId: 'PLACEHOLDER',
              measurementId: 'PLACEHOLDER',
            },
          };
          EOF

      - name: Build Angular Dev
        run: npx ng build --configuration=development --base-href=/tutor-app/dev/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/tutor/browser
          target-folder: dev
          branch: gh-pages
