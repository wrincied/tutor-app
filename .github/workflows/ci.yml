name: CI

on:
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build (development)
        run: npm run build:dev

  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    env:
      DEV_API_URL: ${{ secrets.DEV_API_URL }}
      DEV_API_URL_FALLBACK: 'https://tutor-app-backend--tutorassis.europe-west4.hosted.app'
      DEV_APP_URL: https://wrincied.github.io/tutor-app/dev
      DESIGN_APP_URL: https://wrincied.github.io/tutor-app/design

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve API URL
        id: api
        run: |
          API_URL="${DEV_API_URL:-$DEV_API_URL_FALLBACK}"
          if [ -z "$API_URL" ]; then
            echo "::error::Backend URL is missing. Set secret DEV_API_URL in GitHub Actions OR fill DEV_API_URL_FALLBACK in .github/workflows/ci.yml"
            exit 1
          fi
          if [ -z "$DEV_API_URL" ]; then
            echo "::warning::Using DEV_API_URL_FALLBACK from workflow file (secret DEV_API_URL is not set)"
          fi
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Build classic home (/dev)
        run: |
          API_URL='${{ steps.api.outputs.url }}'
          cat > src/environments/environment.production.ts << EOF
          export const environment = {
            production: true,
            designMode: false,
            apiUrl: '${API_URL}',
            appUrl: '${DEV_APP_URL}',
            firebaseConfig: {
              apiKey: 'AIzaSyDI_O1K8uBbEIe2uJvY-8tzpJjfhgg0rlw',
              authDomain: 'simple4u-64822.web.app',
              projectId: 'tutorassis',
              storageBucket: 'tutorassis.firebasestorage.app',
              messagingSenderId: '965411338053',
              appId: '1:965411338053:web:d98317afdb5602a53c702c',
              measurementId: 'G-TXM74NGN6R',
            },
          };
          EOF
          cp src/environments/environment.production.ts src/environments/environment.ts
          node scripts/prepare-environment.mjs production
          npx ng build --configuration=production --base-href=/tutor-app/dev/ --output-path=dist/classic

      - name: Build studio home (/design)
        run: |
          API_URL='${{ steps.api.outputs.url }}'
          cat > src/environments/environment.production-design.ts << EOF
          export const environment = {
            production: true,
            designMode: true,
            apiUrl: '${API_URL}',
            appUrl: '${DESIGN_APP_URL}',
            firebaseConfig: {
              apiKey: 'AIzaSyDI_O1K8uBbEIe2uJvY-8tzpJjfhgg0rlw',
              authDomain: 'simple4u-64822.web.app',
              projectId: 'tutorassis',
              storageBucket: 'tutorassis.firebasestorage.app',
              messagingSenderId: '965411338053',
              appId: '1:965411338053:web:d98317afdb5602a53c702c',
              measurementId: 'G-TXM74NGN6R',
            },
          };
          EOF
          cp src/environments/environment.production-design.ts src/environments/environment.ts
          node scripts/prepare-environment.mjs production-design
          npx ng build --configuration=production-design --base-href=/tutor-app/design/ --output-path=dist/studio

      - name: Deploy classic to /dev
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/classic/browser
          target-folder: dev
          branch: gh-pages

      - name: Deploy studio to /design
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/studio/browser
          target-folder: design
          branch: gh-pages
          clean: false

      - name: Write root chooser
        run: |
          mkdir -p gh-pages-root
          cat > gh-pages-root/index.html << 'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Simple4U — previews</title>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <style>
                :root { color-scheme: light; font-family: system-ui, sans-serif; }
                body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f4faf7; color: #071714; }
                main { width: min(28rem, calc(100% - 2rem)); }
                h1 { margin: 0 0 0.35rem; font-size: 1.75rem; letter-spacing: -0.03em; }
                p { margin: 0 0 1.25rem; color: #3d5c54; }
                a { display: block; padding: 0.9rem 1rem; margin: 0.5rem 0; border: 1px solid #cfe3d9; border-radius: 0.75rem; background: #fff; color: inherit; text-decoration: none; font-weight: 600; }
                a:hover { border-color: #0f3d34; }
                span { display: block; margin-top: 0.25rem; font-size: 0.8125rem; font-weight: 500; color: #3d5c54; }
              </style>
            </head>
            <body>
              <main>
                <h1>Simple4U</h1>
                <p>Two GitHub Pages previews</p>
                <a href="/tutor-app/dev/">Classic home<span>Current production UI</span></a>
                <a href="/tutor-app/design/">Studio home<span>New day-desk dashboard</span></a>
              </main>
            </body>
          </html>
          EOF

      - name: Publish root chooser
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: gh-pages-root
          target-folder: .
          branch: gh-pages
          clean: false
